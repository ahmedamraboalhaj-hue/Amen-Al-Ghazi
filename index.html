<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشغل فيديو يوتيوب مخصص</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="videoWrapper" class="video-wrapper">
        <iframe id="ytPlayer"
                src="https://www.youtube.com/embed/VIDEO_ID?enablejsapi=1&controls=0&modestbranding=1&rel=0&fs=0&playsinline=1"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen></iframe>

        <div id="customBar" class="custom-bar hidden">
            <button id="playPauseBtn" title="تشغيل / إيقاف"><span class="icon">▶️</span></button>
            <button id="fullscreenBtn" title="ملء الشاشة"><span class="icon">⛶</span></button>
            <span id="currentTime">00:00</span> / <span id="duration">--:--</span>
        </div>

        <div id="clickOverlay" class="click-overlay"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
