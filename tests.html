<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاختبارات - الأمين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{ --primary:#00b4d8; --primary-dark:#0077b6; --accent:#f5a623; --success:#2ed573; --danger:#ff4757; --bg:#f0f7ff; --card:#fff; --text:#1a1a2e; --text2:#475569; --border:#e3f4f9; }
[data-theme="dark"]{ --bg:#0a0e1a; --card:#111827; --text:#e2e8f0; --text2:#8ba3c0; --border:#1e293b; }
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); }

.topbar{ background:var(--card); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:0 4px 12px rgba(0,0,0,.08); }
.logo{ display:flex; align-items:center; gap:12px; text-decoration:none; }
.logo-icon{ width:46px; height:46px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; color:white; font-weight:900; }
.logo-text{ font-size:18px; font-weight:900; color:var(--primary); font-family:'Tajawal',sans-serif; }
.topbar-right{ display:flex; align-items:center; gap:14px; }
.topbar-right button{ background:var(--bg); border:2px solid var(--border); padding:8px 14px; border-radius:10px; cursor:pointer; font-size:14px; transition:all .2s; }
.topbar-right button:hover{ border-color:var(--primary); color:var(--primary); }

.container{ max-width:1200px; margin:0 auto; padding:32px 20px; }
.header{ margin-bottom:32px; }
.page-title{ font-size:32px; font-weight:900; font-family:'Tajawal',sans-serif; margin-bottom:12px; }
.page-subtitle{ color:var(--text2); font-size:16px; }

.tests-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; margin-bottom:40px; }
.test-card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 4px 16px rgba(0,0,0,.04); transition:all .3s; cursor:pointer; }
.test-card:hover{ transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,119,182,.12); }
.test-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.test-icon{ font-size:32px; width:50px; height:50px; display:flex; align-items:center; justify-content:center; background:var(--bg); border-radius:12px; }
.test-status{ font-size:12px; font-weight:700; padding:4px 10px; border-radius:6px; }
.status-done{ background:#e8f9f0; color:#27ae60; }
.status-pending{ background:#fff8e8; color:#e67e22; }
.status-notstart{ background:#f0f0f0; color:#888; }

.test-title{ font-size:18px; font-weight:800; margin-bottom:8px; }
.test-meta{ display:flex; gap:12px; font-size:13px; color:var(--text2); margin-bottom:16px; flex-wrap:wrap; }
.test-meta span{ display:flex; align-items:center; gap:4px; }

.test-progress{ width:100%; height:6px; background:var(--border); border-radius:6px; overflow:hidden; }
.progress-fill{ height:100%; background:linear-gradient(90deg,var(--primary),var(--accent)); width:0%; transition:width .3s; }

.test-actions{ display:flex; gap:10px; margin-top:16px; }
.btn{ flex:1; padding:10px; border:none; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; transition:all .2s; font-family:'Cairo',sans-serif; }
.btn-start{ background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; }
.btn-start:hover{ transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,119,182,.3); }
.btn-review{ background:var(--bg); color:var(--primary); border:2px solid var(--primary); }
.btn-review:hover{ background:var(--primary); color:white; }

.stats-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:40px; }
.stat-box{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; text-align:center; box-shadow:0 4px 16px rgba(0,0,0,.04); }
.stat-val{ font-size:36px; font-weight:900; color:var(--primary); margin-bottom:8px; }
.stat-label{ font-size:14px; color:var(--text2); font-weight:600; }

.quiz-modal{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:300; align-items:center; justify-content:center; }
.quiz-modal.open{ display:flex; }
.quiz-content{ background:var(--card); border-radius:22px; padding:36px; width:100%; max-width:700px; max-height:90vh; overflow-y:auto; }
.quiz-header{ text-align:center; margin-bottom:32px; }
.quiz-title{ font-size:24px; font-weight:900; font-family:'Tajawal',sans-serif; margin-bottom:12px; }
.question-box{ background:var(--bg); border-radius:14px; padding:24px; margin-bottom:20px; }
.q-number{ font-size:14px; color:var(--text2); font-weight:700; margin-bottom:10px; }
.q-text{ font-size:16px; font-weight:700; margin-bottom:16px; }
.options{ display:flex; flex-direction:column; gap:10px; }
.option{ background:white; border:2px solid var(--border); padding:14px 16px; border-radius:10px; cursor:pointer; transition:all .2s; font-size:14px; }
.option:hover{ border-color:var(--primary); background:rgba(0,180,216,.03); }
.option.selected{ border-color:var(--primary); background:rgba(0,180,216,.1); }
.quiz-actions{ display:flex; gap:12px; margin-top:24px; }
.btn-submit{ flex:1; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; border:none; padding:14px; border-radius:12px; font-weight:800; cursor:pointer; font-size:16px; }
.btn-submit:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,119,182,.3); }

@media(max-width:768px){ .tests-grid{ grid-template-columns:1fr; } .quiz-content{ padding:24px; } }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">أ</div>
    <div class="logo-text">الأمين</div>
  </a>
  <div class="topbar-right">
    <button onclick="window.location='dashboard.html'">📊 لوحة التحكم</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="page-title">الاختبارات والتقييمات 📝</div>
    <div class="page-subtitle">اختبر مستواك وقيّم معرفتك</div>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" id="totalTests">8</div>
      <div class="stat-label">إجمالي الاختبارات</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="completedTests">3</div>
      <div class="stat-label">اختبارات مكتملة</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="avgScore">82</div>
      <div class="stat-label">متوسط النتيجة</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="scoreRank">ممتاز</div>
      <div class="stat-label">تقييمك</div>
    </div>
  </div>

  <div style="margin-bottom:24px;">
    <h2 style="font-size:20px; font-weight:900; margin-bottom:16px;">اختبارات متاحة</h2>
  </div>

  <div class="tests-grid" id="testsContainer">
    <!-- Tests will be rendered here -->
  </div>
</div>

<!-- QUIZ MODAL -->
<div class="quiz-modal" id="quizModal">
  <div class="quiz-content">
    <div class="quiz-header">
      <div class="quiz-title" id="quizTitle">اختبار الدرس</div>
      <p style="color:var(--text2); font-size:14px;">الوقت المتبقي: <span id="timeLeft">10:00</span></p>
    </div>
    <div id="questionsContainer"></div>
    <div class="quiz-actions">
      <button class="btn-submit" onclick="submitQuiz()">إرسال الإجابات ✅</button>
      <button style="flex:1; background:var(--bg); border:2px solid var(--border); padding:14px; border-radius:12px; font-weight:800; cursor:pointer;" onclick="closeQuiz()">إلغاء ✕</button>
    </div>
  </div>
</div>

<script>
function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('quiz-theme',dark?'light':'dark');
}
const t=localStorage.getItem('quiz-theme');
if(t) document.documentElement.setAttribute('data-theme',t);

const tests=[
  {id:1,title:'اختبار الدرس الأول',course:'اللغة العربية',questions:5,time:10,status:'pending',score:0},
  {id:2,title:'اختبار المفردات',course:'اللغة العربية',questions:10,time:15,status:'done',score:88},
  {id:3,title:'اختبار القواعد',course:'اللغة العربية',questions:8,time:20,status:'done',score:92},
  {id:4,title:'اختبار شامل',course:'اللغة العربية',questions:20,time:45,status:'notstart',score:0},
  {id:5,title:'اختبار الفهم',course:'اللغة العربية',questions:6,time:12,status:'pending',score:0},
  {id:6,title:'اختبار التطبيق',course:'اللغة العربية',questions:5,time:15,status:'done',score:76},
  {id:7,title:'اختبار الكتابة',course:'اللغة العربية',questions:3,time:20,status:'notstart',score:0},
  {id:8,title:'اختبار نهائي',course:'اللغة العربية',questions:15,time:30,status:'notstart',score:0},
];

const questions=[
  {q:'ما هي أساسيات اللغة العربية؟',opts:['القواعد والمفردات','التاريخ فقط','الثقافة فقط','لا شيء']},
  {q:'عرّف الاسم في اللغة العربية',opts:['ما يدل على ذات','ما يدل على حدث','ما يدل على صفة','لا أعرف']},
  {q:'كم عدد حروف العربية؟',opts:['28','26','30','25']},
  {q:'الحركات الأساسية هي',opts:['الفتحة والضمة والكسرة','البريق والحاء','الهمزة والياء','لا أعرف']},
  {q:'ما أطول سورة في القرآن؟',opts:['البقرة','آل عمران','الفاتحة','يس']},
];

function renderTests(){
  const container=document.getElementById('testsContainer');
  container.innerHTML=tests.map(t=>{
    const progress=t.status==='done'?100:t.status==='pending'?50:0;
    return `
    <div class="test-card">
      <div class="test-header">
        <div class="test-icon">📋</div>
        <span class="test-status ${t.status==='done'?'status-done':t.status==='pending'?'status-pending':'status-notstart'}">
          ${t.status==='done'?'مكتمل':t.status==='pending'?'قيد الإجراء':'لم يبدأ'}
        </span>
      </div>
      <div class="test-title">${t.title}</div>
      <div class="test-meta">
        <span>📚 ${t.course}</span>
        <span>❓ ${t.questions} أسئلة</span>
        <span>⏱️ ${t.time} دقيقة</span>
      </div>
      ${t.status==='done'?`<p style="font-size:14px; color:var(--text2); margin-bottom:12px;">النتيجة: <strong style="color:var(--primary)">${t.score}%</strong></p>`:''}
      <div class="test-progress">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="test-actions">
        <button class="btn btn-start" onclick="startQuiz(${t.id})">${t.status==='done'?'إعادة الاختبار':'ابدأ الآن'}</button>
        ${t.status==='done'?`<button class="btn btn-review" onclick="alert('عرض التفاصيل')">التفاصيل</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function startQuiz(id){
  const test=tests.find(t=>t.id===id);
  document.getElementById('quizTitle').textContent=test.title;
  
  let html='';
  for(let i=0;i<test.questions;i++){
    const q=questions[i%questions.length];
    html+=`
    <div class="question-box">
      <div class="q-number">السؤال ${i+1} من ${test.questions}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((opt,idx)=>`<div class="option" onclick="selectOption(this)">${opt}</div>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('questionsContainer').innerHTML=html;
  document.getElementById('quizModal').classList.add('open');
  
  let timeLeft=test.time*60;
  setInterval(()=>{
    if(timeLeft>0){
      timeLeft--;
      const mins=Math.floor(timeLeft/60);
      const secs=timeLeft%60;
      document.getElementById('timeLeft').textContent=`${mins}:${secs<10?'0':''}${secs}`;
    }
  },1000);
}

function selectOption(el){
  const parent=el.parentElement;
  parent.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}

function submitQuiz(){
  alert('تم إرسال إجاباتك! سيتم تصحيح الاختبار قريباً ✅');
  document.getElementById('quizModal').classList.remove('open');
  renderTests();
}

function closeQuiz(){
  document.getElementById('quizModal').classList.remove('open');
}

renderTests();
</script>
</body>
</html>
