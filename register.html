<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب - منصة الأمين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
<style>
:root { --primary:#C8A96E; --primary-dark:#8B6914; --accent:#f5a623; --success:#2ed573; --danger:#ff4757; --bg:#FDF8F0; --card:#fff; --text:#0f172a; --text2:#475569; --border:#E8D5A3; }
[data-theme="dark"] { --bg:#1a1209; --card:#2a1f0f; --text:#e2eaf4; --text2:#b89a6a; --border:#3d2e10; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

nav { padding:0 48px; height:72px; background:var(--card); display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(139,105,20,.08); position:relative; }
nav::after { content:''; position:absolute; right:0; bottom:-2px; left:0; height:2px; background:linear-gradient(90deg,var(--border) 0%,var(--primary) 18%,#fff7e0 32%,var(--accent) 42%,var(--primary) 58%,var(--border) 100%); background-size:220% 100%; animation:navShine 5s linear infinite; }
@keyframes navShine { 0%{background-position:0% 0} 100%{background-position:-220% 0} }
.nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
.nav-logo-box { width:46px; height:46px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; color:white; font-weight:900; box-shadow:0 4px 14px rgba(139,105,20,0.3); }
.nav-brand { font-family:'Tajawal',sans-serif; font-size:19px; font-weight:900; color:var(--primary); }
.nav-sub { font-size:10px; color:var(--text2); display:block; margin-top:-3px; }
.theme-btn { width:40px; height:40px; border-radius:10px; background:var(--bg); border:2px solid var(--border); cursor:pointer; font-size:17px; }

.page-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
.register-box { width:100%; max-width:520px; }

.reg-header { text-align:center; margin-bottom:32px; }
.reg-icon { width:72px; height:72px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:20px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:32px; box-shadow:0 6px 24px rgba(139,105,20,.3); }
.reg-title { font-family:'Tajawal',sans-serif; font-size:28px; font-weight:900; margin-bottom:6px; }
.reg-sub { font-size:14px; color:var(--text2); }

.card { background:var(--card); border-radius:20px; padding:36px; box-shadow:0 8px 32px rgba(139,105,20,.1); border:1px solid var(--border); }

.form-grp { margin-bottom:18px; }
.form-label { display:block; font-weight:700; font-size:14px; margin-bottom:8px; }
.input-wrap { position:relative; }
.input-ico { position:absolute; top:50%; transform:translateY(-50%); right:16px; font-size:17px; pointer-events:none; z-index:2; }
.form-input { width:100%; padding:14px 48px 14px 16px; border:2px solid var(--border); border-radius:13px; font-family:'Cairo',sans-serif; font-size:15px; background:var(--bg); color:var(--text); outline:none; transition:all .2s; }
.form-input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(200,169,110,.1); background:var(--card); }
.eye-toggle { position:absolute; top:50%; transform:translateY(-50%); left:14px; background:none; border:none; cursor:pointer; font-size:17px; color:var(--text2); }

/* بادج "اختياري" */
.optional-badge { font-size:11px; font-weight:600; color:var(--text2); background:rgba(200,169,110,.12); border:1px solid var(--border); border-radius:6px; padding:2px 7px; margin-right:8px; vertical-align:middle; }

/* بوكس تنبيه رقم الاسترداد */
.recovery-hint { margin-top:8px; padding:10px 14px; background:rgba(200,169,110,.07); border:1px solid rgba(200,169,110,.25); border-radius:10px; font-size:13px; color:var(--text2); display:flex; gap:8px; align-items:flex-start; }
.recovery-hint .icon { font-size:16px; flex-shrink:0; margin-top:1px; }

.divider-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

.btn-submit { width:100%; padding:15px; background:linear-gradient(135deg,#D4A843,#C8A96E,#8B6914); color:white; border:none; border-radius:14px; font-family:'Cairo',sans-serif; font-weight:800; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; position:relative; overflow:hidden; margin-top:8px; box-shadow:0 8px 0 #5C4008,0 12px 28px rgba(139,105,20,.4),inset 0 1px 0 rgba(255,255,255,.25); transition:transform .12s,box-shadow .12s; }
.btn-submit:hover { transform:translateY(-4px); box-shadow:0 12px 0 #4a3306,0 20px 40px rgba(139,105,20,.5),inset 0 1px 0 rgba(255,255,255,.3); }
.btn-submit:active { transform:translateY(6px); box-shadow:0 2px 0 #5C4008; }
.btn-spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.alert { display:none; padding:14px 18px; border-radius:12px; font-size:14px; font-weight:600; margin-bottom:20px; animation:slideDown .3s; }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.alert.err { background:#fff0f3; color:#c0392b; border:1.5px solid #ffd0d8; }
.alert.ok { background:#f0fff6; color:#27ae60; border:1.5px solid #b3f5d1; }
[data-theme="dark"] .alert.err { background:#2d1518; border-color:#7b2d36; color:#ff8896; }
[data-theme="dark"] .alert.ok { background:#0e2318; border-color:#1a6640; color:#4ddb8a; }

.login-row { text-align:center; margin-top:20px; font-size:15px; color:var(--text2); }
.login-row a { color:var(--primary); font-weight:800; text-decoration:none; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-box">أ</div>
    <div><span class="nav-brand">الأمين</span><span class="nav-sub">في اللغة العربية</span></div>
  </a>
  <button class="theme-btn" onclick="toggleTheme()">🌙</button>
</nav>

<div class="page-wrap">
  <div class="register-box">
    <div class="reg-header">
      <div class="reg-icon">📝</div>
      <div class="reg-title">إنشاء حساب جديد</div>
      <div class="reg-sub">سجّل بياناتك وابدأ رحلتك مع الأمين!</div>
    </div>

    <div class="card">
      <div class="alert" id="alertBox"></div>

      <div class="divider-row">
        <div class="form-grp">
          <label class="form-label">الاسم الأول</label>
          <div class="input-wrap">
            <span class="input-ico">👤</span>
            <input class="form-input" type="text" id="firstNameInp" placeholder="مثال: أحمد">
          </div>
        </div>
        <div class="form-grp">
          <label class="form-label">الاسم الأخير</label>
          <div class="input-wrap">
            <span class="input-ico">👤</span>
            <input class="form-input" type="text" id="lastNameInp" placeholder="مثال: محمد">
          </div>
        </div>
      </div>

      <div class="form-grp">
        <label class="form-label">رقم موبايلك</label>
        <div class="input-wrap">
          <span class="input-ico">📱</span>
          <input class="form-input" type="tel" id="phoneInp" placeholder="01xxxxxxxxx">
        </div>
      </div>

      <!-- ✅ رقم هاتف الاسترداد -->
      <div class="form-grp">
        <label class="form-label">
          رقم موبايل الاسترداد
          <span class="optional-badge">اختياري</span>
        </label>
        <div class="input-wrap">
          <span class="input-ico">🔐</span>
          <input class="form-input" type="tel" id="recoveryPhoneInp" placeholder="رقم موبايل تاني لو نسيت كلمة المرور">
        </div>
        <div class="recovery-hint">
          <span class="icon">💡</span>
          <span>لو نسيت كلمة المرور، هتقدر تعملها جديدة بواسطة رقم الاسترداد ده. اكتب رقم تاني غير رقمك.</span>
        </div>
      </div>

      <div class="form-grp">
        <label class="form-label">كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-ico">🔒</span>
          <input class="form-input" type="password" id="passInp" placeholder="اختار كلمة مرور قوية">
          <button class="eye-toggle" onclick="toggleEye('passInp','eyeBtn1')" id="eyeBtn1">👁️</button>
        </div>
      </div>

      <div class="form-grp">
        <label class="form-label">تأكيد كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-ico">🔒</span>
          <input class="form-input" type="password" id="confirmInp" placeholder="اكتب كلمة المرور تاني">
          <button class="eye-toggle" onclick="toggleEye('confirmInp','eyeBtn2')" id="eyeBtn2">👁️</button>
        </div>
      </div>

      <button class="btn-submit" onclick="doRegister()" id="regBtn">
        <span id="regBtnText">إنشاء الحساب 🚀</span>
        <div class="btn-spinner" id="regSpinner"></div>
      </button>
    </div>

    <div class="login-row">عندك حساب؟ <a href="login.html">سجّل دخولك!</a></div>
  </div>
</div>

<script>
function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.querySelector('.theme-btn').textContent=dark?'🌙':'☀️';
  localStorage.setItem('alamin_theme',dark?'light':'dark');
}
const t=localStorage.getItem('alamin_theme');
if(t){document.documentElement.setAttribute('data-theme',t);document.querySelector('.theme-btn').textContent=t==='dark'?'☀️':'🌙';}

function toggleEye(inputId,btnId){
  const i=document.getElementById(inputId);
  const b=document.getElementById(btnId);
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁️':'🙈';
}

function showAlert(msg,type){
  const a=document.getElementById('alertBox');
  a.textContent=msg; a.className='alert '+(type==='error'?'err':'ok');
  a.style.display='block';
  setTimeout(()=>a.style.display='none',5000);
}

function setLoading(v){
  document.getElementById('regBtnText').style.display=v?'none':'block';
  document.getElementById('regSpinner').style.display=v?'block':'none';
  document.getElementById('regBtn').disabled=v;
}

async function doRegister(){
  const firstName   = document.getElementById('firstNameInp').value.trim();
  const lastName    = document.getElementById('lastNameInp').value.trim();
  const phone       = document.getElementById('phoneInp').value.trim();
  const recoveryPhone = document.getElementById('recoveryPhoneInp').value.trim();
  const pass        = document.getElementById('passInp').value;
  const confirm     = document.getElementById('confirmInp').value;

  // ─── تحقق أساسي ───
  if(!firstName||!lastName){ showAlert('❌ من فضلك ادخل اسمك الأول والأخير','error'); return; }
  if(!phone){ showAlert('❌ من فضلك ادخل رقم موبايلك','error'); return; }
  if(!/^01[0-9]{9}$/.test(phone)){ showAlert('❌ رقم الموبايل غير صحيح، لازم يبدأ بـ 01 ويكون 11 رقم','error'); return; }
  if(recoveryPhone && !/^01[0-9]{9}$/.test(recoveryPhone)){ showAlert('❌ رقم موبايل الاسترداد غير صحيح','error'); return; }
  if(recoveryPhone && recoveryPhone === phone){ showAlert('❌ رقم الاسترداد لازم يكون مختلف عن رقمك الأساسي','error'); return; }
  if(!pass){ showAlert('❌ من فضلك ادخل كلمة المرور','error'); return; }
  if(pass.length < 6){ showAlert('❌ كلمة المرور لازم تكون 6 حروف على الأقل','error'); return; }
  if(pass !== confirm){ showAlert('❌ كلمة المرور مش متطابقة!','error'); return; }

  setLoading(true);

  try {
    // ─── تحقق إن الرقم مش موجود قبل كده ───
    const existing = await db.collection('students').where('phone','==',phone).get();
    if(!existing.empty){
      showAlert('❌ رقم الموبايل ده مسجّل قبل كده!','error');
      setLoading(false); return;
    }

    // ─── حفظ بيانات الطالب ───
    const studentData = {
      firstName,
      lastName,
      name: firstName + ' ' + lastName,
      phone,
      password: pass,
      createdAt: new Date().toISOString(),
      role: 'student',
    };

    // أضف رقم الاسترداد لو المستخدم كتبه
    if(recoveryPhone) studentData.recoveryPhone = recoveryPhone;

    const docRef = await db.collection('students').add(studentData);

    // حفظ في localStorage
    studentData.id = docRef.id;
    studentData.role = 'student';
    localStorage.setItem('alamin_current', JSON.stringify(studentData));

    showAlert('✅ تم إنشاء حسابك بنجاح! جاري التوجيه...','ok');
    setTimeout(()=>window.location.href='index.html', 1200);

  } catch(err){
    console.error(err);
    showAlert('❌ حدث خطأ في الاتصال بقاعدة البيانات','error');
    setLoading(false);
  }
}

document.addEventListener('keydown',e=>{ if(e.key==='Enter') doRegister(); });
</script>
</body>
</html>
